<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    window.addEventListener("resize", navigator.keyboard.lock(["Escape"]));
  </script>

<body id="no" class="tabs-shell">
  <aside class="tab-strip" id="right-side-nav" aria-label="Tabs">
    <ul id="tab-list" role="tablist"></ul>
    <button type="button" title="New tab (Ctrl+T)" id="add-tab" aria-label="New tab">
      <i class="fa-solid fa-plus" aria-hidden="true"></i>
    </button>
  </aside>

  <header class="nav-bar" aria-label="Navigation">
    <div class="nav-container">
      <div class="nav-left">
        <button type="button" title="NovaDesk home" id="home-page" class="chip-btn" onclick="Home()">
          <i class="fa-solid fa-house" aria-hidden="true"></i>
        </button>
        <button type="button" title="Back" class="chip-btn" onclick="goBack()">
          <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
        </button>
        <button type="button" title="Forward" class="chip-btn" onclick="goForward()">
          <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
        </button>
        <button type="button" title="Reload" onclick="reload()" class="chip-btn">
          <i class="fa-solid fa-rotate-right" aria-hidden="true"></i>
        </button>
        <form id="fv" class="url-form" method="POST">
          <label class="visually-hidden" for="input">Address and search</label>
          <input id="input" class="url-bar" placeholder="Search or enter a URL" type="text" autocomplete="off" />
        </form>
      </div>
      <div class="nav-right">
        <button type="button" title="Fullscreen" id="fullscreen-button" class="chip-btn" onclick="FS()">
          <i class="fa-solid fa-expand" aria-hidden="true"></i>
        </button>
        <button type="button" title="Pop out" id="popout-button" class="chip-btn" onclick="popout()">
          <i class="fa-solid fa-up-right-from-square" aria-hidden="true"></i>
        </button>
        <button type="button" title="Inspect" class="chip-btn" onclick="eToggle()">
          <i class="fa-solid fa-code" aria-hidden="true"></i>
        </button>
        <button type="button" title="Toggle tab bar" id="tabs-button" class="chip-btn">
          <i class="fa-solid fa-table-cells" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="frame-container" id="frame-container" aria-live="polite"></main>

  <script src="assets/js/t3.js?v=03"></script>
  <script src="./assets/mathematics/bundle.js?v=2025-04-15"></script>

</body>

</html>
